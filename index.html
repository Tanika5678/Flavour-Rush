<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlavourRush — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); overflow:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse at 20% 50%,rgba(255,90,31,0.12) 0%,transparent 55%),
              radial-gradient(ellipse at 80% 20%,rgba(243,156,18,0.07) 0%,transparent 45%);
}
.auth-wrap {
  position:relative; z-index:2;
  display:flex; width:min(980px,96vw); min-height:590px;
  border-radius:28px; overflow:hidden;
  border:1px solid var(--border); box-shadow:0 40px 100px rgba(0,0,0,0.55);
  animation:up .65s cubic-bezier(.22,1,.36,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(44px)}to{opacity:1;transform:none}}

/* LEFT PANEL */
.auth-left {
  flex:1.15; position:relative; overflow:hidden;
  background:linear-gradient(145deg,#ff5a1f 0%,#e8390e 42%,#b52d0a 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:52px 40px;
}
.auth-left::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,0.07);top:-100px;right:-100px;}
.auth-left::after{content:'';position:absolute;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,0.05);bottom:-80px;left:-80px;}
.auth-brand { position:relative; z-index:1; text-align:center; }
.auth-brand h1 { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:#fff; letter-spacing:-1px; line-height:1; }
.auth-brand p { color:rgba(255,255,255,0.7); font-size:0.82rem; letter-spacing:3px; text-transform:uppercase; margin-top:6px; }
.auth-desc { color:rgba(255,255,255,0.85); font-size:1rem; line-height:1.75; text-align:center; margin-top:28px; position:relative; z-index:1; }
.auth-icons { display:flex; gap:12px; margin-top:36px; position:relative; z-index:1; }
.auth-icons span { font-size:2.4rem; animation:bob 3s ease-in-out infinite; }
.auth-icons span:nth-child(2){animation-delay:.4s}
.auth-icons span:nth-child(3){animation-delay:.8s}
.auth-icons span:nth-child(4){animation-delay:1.2s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}

.auth-features { margin-top:32px; position:relative; z-index:1; display:flex; flex-direction:column; gap:10px; }
.auth-feat { display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.9); font-size:0.88rem; }
.auth-feat-icon { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }

/* RIGHT PANEL */
.auth-right { flex:1; background:var(--card-bg); display:flex; flex-direction:column; justify-content:center; padding:50px 44px; }
.auth-hello { font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:700; color:var(--text); margin-bottom:4px; }
.auth-sub { color:var(--text-muted); font-size:0.88rem; margin-bottom:28px; }
.auth-tabs { display:flex; background:var(--input-bg); border-radius:12px; padding:4px; margin-bottom:28px; }
.auth-tab { flex:1; padding:10px; border:none; background:transparent; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:500; border-radius:9px; cursor:pointer; transition:all .25s; }
.auth-tab.active { background:var(--accent); color:#fff; font-weight:600; }
.form { display:none; flex-direction:column; gap:16px; }
.form.active { display:flex; }
.field label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-muted); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
.field input {
  width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:12px;
  background:var(--input-bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.94rem; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,90,31,0.14); }
.submit-btn {
  padding:14px; background:linear-gradient(135deg,#ff5a1f,#e8390e); color:#fff; border:none;
  border-radius:12px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .2s; box-shadow:0 6px 24px rgba(255,90,31,0.38); margin-top:4px;
}
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(255,90,31,0.5); }
.divider { display:flex; align-items:center; gap:12px; color:var(--text-dim); font-size:0.78rem; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.social-row { display:flex; gap:10px; }
.social-btn {
  flex:1; padding:11px; border:1.5px solid var(--border); border-radius:11px;
  background:var(--input-bg); color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:0.88rem; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.social-btn:hover { border-color:var(--accent); background:var(--accent-soft); }
@media(max-width:640px){.auth-left{display:none}.auth-right{padding:36px 24px}}
</style>
</head>
<body>
<div class="auth-wrap">
  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-brand">
      <h1>FlavourRush</h1>
      <p>— Taste the Rush —</p>
    </div>
    <p class="auth-desc">Restaurant-quality food,<br>delivered to your door in 30 min.</p>
    <div class="auth-icons">
      <span>🍕</span><span>🍔</span><span>🍛</span><span>🍰</span>
    </div>
    <div class="auth-features">
      <div class="auth-feat"><div class="auth-feat-icon">⚡</div> 30-minute delivery guarantee</div>
      <div class="auth-feat"><div class="auth-feat-icon">🌟</div> 4.8★ average rating</div>
      <div class="auth-feat"><div class="auth-feat-icon">🍽️</div> 50+ menu items daily</div>
    </div>
  </div>
  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-hello">Welcome back 👋</div>
    <div class="auth-sub">Login to continue ordering your favourites</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login',this)">Login</button>
      <button class="auth-tab" onclick="showTab('signup',this)">Sign Up</button>
    </div>
    <!-- Login -->
    <form class="form active" id="f-login" onsubmit="go(event)">
      <div class="field"><label>Email</label><input type="email" placeholder="you@example.com" required></div>
      <div class="field"><label>Password</label><input type="password" placeholder="••••••••" required></div>
      <button class="submit-btn" type="submit">Login & Start Ordering →</button>
      <div class="divider">or</div>
      <div class="social-row">
        <button type="button" class="social-btn" onclick="location.href='home.html'">👤 Guest Mode</button>
        <button type="button" class="social-btn">🌐 Google</button>
      </div>
    </form>
    <!-- Signup -->
    <form class="form" id="f-signup" onsubmit="signup(event)">
      <div class="field"><label>Full Name</label><input type="text" placeholder="Your name" required></div>
      <div class="field"><label>Email</label><input type="email" placeholder="you@example.com" required></div>
      <div class="field"><label>Phone</label><input type="tel" placeholder="+91 98765 43210"></div>
      <div class="field"><label>Password</label><input type="password" placeholder="Min. 8 characters" required></div>
      <button class="submit-btn" type="submit">Create Account & Order →</button>
    </form>
  </div>
</div>
<script>
function showTab(t,el){
  document.querySelectorAll('.auth-tab').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('f-login').classList.toggle('active',t==='login');
  document.getElementById('f-signup').classList.toggle('active',t==='signup');
  document.querySelector('.auth-hello').textContent=t==='login'?'Welcome back 👋':'Create account 🎉';
  document.querySelector('.auth-sub').textContent=t==='login'?'Login to continue ordering your favourites':'Join FlavourRush and start ordering!';
}
function go(e){e.preventDefault();location.href='home.html';}
function signup(e){e.preventDefault();alert('Account created! Welcome to FlavourRush 🎉');location.href='home.html';}
</script>
</body>
</html>
