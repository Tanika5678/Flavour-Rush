<style>
.menu-hero { padding:52px clamp(16px,4vw,60px) 40px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,var(--card-bg) 0%,transparent 100%); }
.cat-tabs { display:flex;gap:8px;flex-wrap:wrap;margin-top:28px; }
.cat-tab {
  display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;
  border:1.5px solid var(--border);background:var(--card-bg);color:var(--text-muted);
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .22s;
}
.cat-tab img{width:24px;height:24px;border-radius:50%;object-fit:cover;}
.cat-tab:hover{border-color:var(--accent);color:var(--accent);}
.cat-tab.active{background:linear-gradient(135deg,#ff5a1f,#e8390e);border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(255,90,31,0.35);}
.menu-body{padding:36px clamp(16px,4vw,60px);max-width:1300px;margin:0 auto;}
.filter-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:32px;}
.cat-section{margin-bottom:60px;}
.cat-section-hd{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.cat-section-hd img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.cat-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--text);}
.cat-count{margin-left:auto;font-size:.82rem;color:var(--text-muted);background:var(--input-bg);padding:4px 14px;border-radius:50px;}
.no-results{text-align:center;padding:80px 20px;color:var(--text-muted);}
.no-results .nr-ico{font-size:4rem;margin-bottom:16px;}
</style>
</head>

var activeCat='all',activeFilter='all',activeSort='',searchQ='';

function getItems(cat){return cat==='all'?Object.values(MENU).flat():(MENU[cat]||[]);}
function applyAll(items){
  var r=[].concat(items);
  if(activeFilter!=='all')r=r.filter(function(i){return i.badge===activeFilter;});
  if(searchQ)r=r.filter(function(i){return i.name.toLowerCase().includes(searchQ)||i.desc.toLowerCase().includes(searchQ);});
  if(activeSort==='price-asc')r.sort(function(a,b){return a.price-b.price;});
  else if(activeSort==='price-desc')r.sort(function(a,b){return b.price-a.price;});
  else if(activeSort==='rating')r.sort(function(a,b){return b.rating-a.rating;});
  return r;
}
function renderMenu(){
  var el=document.getElementById('menu-content');
  if(activeCat==='all'){
    var html='';
    Object.keys(CAT).forEach(function(cat){
      var items=applyAll(MENU[cat]);
      if(!items.length)return;
      html+='<div class="cat-section"><div class="cat-section-hd"><img src="'+CAT[cat].img+'" alt=""><span class="cat-title">'+CAT[cat].label+'</span><span class="cat-count">'+items.length+' items</span></div><div class="grid grid-4">'+items.map(renderCard).join('')+'</div></div>';
    });
    el.innerHTML=html||'<div class="no-results"><div class="nr-ico">😕</div><p>No items match</p></div>';
  } else {
    var items=applyAll(getItems(activeCat));
    if(!items.length){el.innerHTML='<div class="no-results"><div class="nr-ico">😕</div><p>No items match your filters</p></div>';return;}
    el.innerHTML='<div class="cat-section"><div class="cat-section-hd"><img src="'+CAT[activeCat].img+'" alt=""><span class="cat-title">'+CAT[activeCat].label+'</span><span class="cat-count">'+items.length+' items</span></div><div class="grid grid-4">'+items.map(renderCard).join('')+'</div></div>';
  }
}
function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderMenu();
}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderMenu();
}
function setSort(v){activeSort=v;renderMenu();}
function searchMenu(q){searchQ=q.toLowerCase().trim();renderMenu();}

// URL param
var p=new URLSearchParams(location.search).get('cat');
if(p&&MENU[p]){
  activeCat=p;
  document.querySelector('[data-cat="all"]').classList.remove('active');
  var tb=document.querySelector('[data-cat="'+p+'"]');
  if(tb)tb.classList.add('active');
}
renderMenu();
</script>

</html>
